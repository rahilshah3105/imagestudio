<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbcfe8" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glowing Ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#shieldGrad)" stroke-width="4" stroke-dasharray="6 4" opacity="0.3" />
  
  <!-- Main Rounded Hexagon Shield -->
  <path d="M50 6 L88 28 L88 72 L50 94 L12 72 L12 28 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="4.5" stroke-linejoin="round" filter="url(#neonGlow)" />
  
  <!-- Center Shutter Aperture / Lens -->
  <circle cx="50" cy="50" r="22" fill="#0d1117" stroke="url(#shieldGrad)" stroke-width="3" />
  
  <!-- Aperture Blades -->
  <path d="M50 28 L50 38 M69 39 L60 44 M69 61 L60 56 M50 72 L50 62 M31 61 L40 56 M31 39 L40 44" stroke="url(#shieldGrad)" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  
  <!-- Inner Glass Sphere -->
  <circle cx="50" cy="50" r="14" fill="url(#shieldGrad)" opacity="0.6" />
  <circle cx="46" cy="46" r="6" fill="#ffffff" opacity="0.45" />
  
  <!-- Magic Wand crossing diagonally -->
  <path d="M22 78 L72 28 C74 26 77 26 79 28 L82 31 C84 33 84 36 82 38 L32 88 Z" fill="url(#wandGrad)" opacity="0.95" />
  <!-- Wand Tip -->
  <path d="M75 25 L85 15 C87 13 90 16 88 18 L78 28 Z" fill="#ec4899" />
  
  <!-- Sparkles -->
  <path d="M85 38 L87 42 L91 43 L87 44 L85 48 L83 44 L79 43 L83 42 Z" fill="#06b6d4" />
  <path d="M15 62 L17 66 L21 67 L17 68 L15 72 L13 68 L9 67 L13 66 Z" fill="#8b5cf6" />
  <path d="M50 14 L51 17 L54 18 L51 19 L50 22 L49 19 L46 18 L49 17 Z" fill="#ffffff" />
</svg>
